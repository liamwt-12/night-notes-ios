workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: DelayRepay Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: uk.nightnotes.app
      xcode: latest
      vars:
        BUNDLE_ID: "uk.nightnotes.app"

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode Project
        script: xcodegen generate

      - name: Resolve packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "NightNotes.xcodeproj" \
            -scheme "NightNotes"

      - name: Set up signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Set build number
        script: |
          agvtool new-version -all 15

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "NightNotes.xcodeproj" \
            --scheme "NightNotes"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
