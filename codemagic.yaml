workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    integrations:
      app_store_connect: DelayRepay Codemagic
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: uk.nightnotes.app
      xcode: 15.2
    
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      
      - name: Generate Xcode Project
        script: xcodegen generate
      
      - name: Resolve packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "NightNotes.xcodeproj" \
            -scheme "NightNotes"
      
      - name: Set up signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "uk.nightnotes.app" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
      
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "NightNotes.xcodeproj" \
            --scheme "NightNotes"
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
